<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=1">
<title>貪食蛇遊戲 v8</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f8f7f3;color:#2c2c2a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#sg{display:flex;flex-direction:column;align-items:center;padding:12px 8px 20px;gap:10px;width:100%}
#sg-topbar{display:flex;align-items:center;gap:7px;width:100%;max-width:440px;flex-wrap:wrap}
.sg-stat{background:#f0ede6;border-radius:8px;padding:5px 11px;text-align:center;min-width:52px}
.sg-stat-label{font-size:11px;color:#9e9b93}
.sg-stat-val{font-size:17px;font-weight:500;color:#2c2c2a}
#sg-speed{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;white-space:nowrap}
#sg-canvas{display:block;border-radius:10px;touch-action:none;max-width:100%}
#sg-theme-row{display:flex;gap:5px;align-items:center}
.sg-tb{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer}
.sg-tb.active{border-color:#2c2c2a}
button{background:#f0ede6;border:0.5px solid #d6d3cc;color:#2c2c2a;font-family:inherit}
button:hover{background:#e8e5de}

/* D-PAD */
#dpad{
  display:grid;
  grid-template-columns:52px 52px 52px;
  grid-template-rows:52px 52px 52px;
  gap:0;width:156px;height:156px;flex-shrink:0;
}
.dp-btn{
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;user-select:none;-webkit-user-select:none;
  background:#f0ede6;border:0.5px solid #d6d3cc;color:#666;
  -webkit-tap-highlight-color:transparent;
  transition:background .1s,transform .08s;
}
.dp-btn:active{background:#e8e5de;transform:scale(0.91)}
#dp-up   {grid-column:2;grid-row:1;border-radius:10px 10px 3px 3px}
#dp-left {grid-column:1;grid-row:2;border-radius:10px 3px 3px 10px}
#dp-center{grid-column:2;grid-row:2;pointer-events:none;background:#f0ede6;border:0.5px solid #d6d3cc}
#dp-right{grid-column:3;grid-row:2;border-radius:3px 10px 10px 3px}
#dp-down {grid-column:2;grid-row:3;border-radius:3px 3px 10px 10px}
.dp-svg{width:22px;height:22px;fill:none;stroke:#666;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

/* game-over overlay — fullscreen fixed */
#sg-ov{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.6);align-items:center;justify-content:center;padding:24px}
#sg-ov.show{display:flex}
#sg-ov-box{background:#fff;border:0.5px solid #d6d3cc;border-radius:16px;padding:26px 24px 20px;width:100%;max-width:320px;text-align:center}
#sg-ov-box h3{margin:0 0 4px;font-size:19px;font-weight:500}
#sg-ov-box p{margin:0 0 14px;font-size:13px;color:#666}
#sg-ov-box input{width:100%;margin-bottom:10px;border-radius:8px;font-size:14px;padding:8px 10px;border:0.5px solid #d6d3cc;background:#f0ede6;color:#2c2c2a;outline:none;font-family:inherit}
#sg-ov-box input:focus{border-color:#999}
.ov-btns{display:flex;gap:8px}
.ov-btns button{flex:1;cursor:pointer;padding:9px;border-radius:8px;font-size:14px}

/* rules — fullscreen fixed */
#sg-rules{display:none;position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,0.55);align-items:center;justify-content:center;padding:24px}
#sg-rules.show{display:flex}
#sg-rules-box{background:#fff;border:0.5px solid #d6d3cc;border-radius:14px;padding:22px 24px;width:100%;max-width:310px}
#sg-rules-box h3{margin:0 0 12px;font-size:16px;font-weight:500}
.r-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;font-size:13px;color:#555;line-height:1.5}
.r-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:1px}
.fl{display:flex;align-items:center;gap:8px;font-size:12px;color:#555;margin-bottom:5px}
.fl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* leaderboard */
#sg-lb{width:100%;max-width:440px}
#sg-lb-ul{list-style:none}
#sg-lb-ul li{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:0.5px solid #e8e5de;font-size:13px}
#sg-lb-ul li:last-child{border-bottom:none}
.lb-rank{font-weight:500;width:20px;text-align:center;color:#999}
.lb-name{flex:1;color:#2c2c2a}
.lb-score{font-weight:500;color:#2c2c2a}
.lb-badge{font-size:11px;padding:2px 7px;border-radius:20px}
</style>
</head>
<body>
<div id="sg">

<div id="sg-topbar">
  <div class="sg-stat"><div class="sg-stat-label">分數</div><div class="sg-stat-val" id="sg-score">0</div></div>
  <div class="sg-stat"><div class="sg-stat-label">最高</div><div class="sg-stat-val" id="sg-best">0</div></div>
  <span id="sg-speed">Lv.1</span>
  <div style="flex:1"></div>
  <div id="sg-theme-row"></div>
  <button id="btn-rules" title="遊戲規則" style="width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:15px;padding:0;flex-shrink:0">?</button>
  <button id="btn-start" style="font-size:12px;padding:6px 12px;cursor:pointer;border-radius:8px;white-space:nowrap;flex-shrink:0">開始</button>
</div>

<canvas id="sg-canvas"></canvas>

<div id="dpad">
  <div class="dp-btn" id="dp-up">
    <svg class="dp-svg" viewBox="0 0 22 22"><polyline points="4,15 11,7 18,15"/></svg>
  </div>
  <div class="dp-btn" id="dp-left">
    <svg class="dp-svg" viewBox="0 0 22 22"><polyline points="15,4 7,11 15,18"/></svg>
  </div>
  <div id="dp-center"></div>
  <div class="dp-btn" id="dp-right">
    <svg class="dp-svg" viewBox="0 0 22 22"><polyline points="7,4 15,11 7,18"/></svg>
  </div>
  <div class="dp-btn" id="dp-down">
    <svg class="dp-svg" viewBox="0 0 22 22"><polyline points="4,7 11,15 18,7"/></svg>
  </div>
</div>

<div style="font-size:11px;color:#999;text-align:center">方向鍵 / WASD　或滑動畫面控制</div>

<div id="sg-ov">
  <div id="sg-ov-box">
    <h3>遊戲結束</h3>
    <p id="sg-ov-msg"></p>
    <input type="text" id="sg-name" maxlength="12" placeholder="輸入暱稱（最多12字）" autocomplete="off"/>
    <div class="ov-btns">
      <button id="btn-skip" style="color:#999">跳過</button>
      <button id="btn-submit">記錄分數</button>
    </div>
  </div>
</div>

<div id="sg-rules">
  <div id="sg-rules-box">
    <h3>遊戲規則</h3>
    <div class="r-row"><div class="r-icon" style="background:#E1F5EE;color:#0F6E56">→</div><div>使用方向鍵、WASD 或滑動畫面控制蛇的移動方向。</div></div>
    <div class="r-row"><div class="r-icon" style="background:#FAECE7;color:#993C1D">✕</div><div>撞牆或撞到自己的身體即遊戲結束。</div></div>
    <div class="r-row"><div class="r-icon" style="background:#FAEEDA;color:#854F0B">↑</div><div>蛇越長、速度越快，難度隨身體長度逐漸提升。</div></div>
    <div class="r-row"><div class="r-icon" style="background:#E6F1FB;color:#185FA5">★</div><div>不同食物分值不同，稀有食物限時出現，快去搶！</div></div>
    <div style="margin:10px 0">
      <div class="fl"><div class="fl-dot" style="background:#D85A30"></div>橘色圓形 — 普通 +1（常駐）</div>
      <div class="fl"><div class="fl-dot" style="background:#888780"></div>銀色圓形 — 銀色 +3（限時）</div>
      <div class="fl"><div class="fl-dot" style="background:#BA7517;border-radius:2px"></div>金色菱形 — 金色 +5（限時）</div>
      <div class="fl"><div class="fl-dot" style="background:#7F77DD;border-radius:2px"></div>紫色星形 — 彩虹 +10（限時）</div>
    </div>
    <button id="btn-rules-close" style="width:100%;cursor:pointer;padding:8px;border-radius:8px;font-size:13px;margin-top:4px">關閉</button>
  </div>
</div>

<div id="sg-lb">
  <div style="display:flex;justify-content:space-between;align-items:center;padding:0 4px 6px">
    <span style="font-size:14px;font-weight:500">排行榜</span>
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:11px;color:#999">前 10 名</span>
      <button id="btn-lb-clear" title="清除所有紀錄" style="font-size:11px;padding:2px 8px;border-radius:6px;cursor:pointer;color:#999">清除</button>
    </div>
  </div>
  <div style="background:#fff;border:0.5px solid #e8e5de;border-radius:10px;overflow:hidden">
    <ul id="sg-lb-ul"><li style="padding:14px;text-align:center;color:#999;font-size:13px">尚無紀錄</li></ul>
  </div>
</div>

</div>

<script>
const canvas=document.getElementById('sg-canvas');
const ctx=canvas.getContext('2d');
let COLS=22,ROWS=20,CW,CH;

function resize(){
  const w=Math.min(window.innerWidth-32,440);
  canvas.width=w;canvas.height=Math.round(w*20/22);
  canvas.style.width=w+'px';canvas.style.height=canvas.height+'px';
  CW=canvas.width/COLS;CH=canvas.height/ROWS;
  ['sg-topbar','sg-lb'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.style.maxWidth=w+'px';
  });
}
resize();
window.addEventListener('resize',()=>{resize();running?render():drawIdle();});

const THEMES=[
  {head:'#1D9E75',body:'#5DCAA5',bg:'#f6faf8',grid:'#e4f0ea',ink:'#085041'},
  {head:'#185FA5',body:'#378ADD',bg:'#f4f8fd',grid:'#daeaf7',ink:'#042C53'},
  {head:'#534AB7',body:'#7F77DD',bg:'#f5f4fe',grid:'#e2e1f9',ink:'#26215C'},
  {head:'#993C1D',body:'#D85A30',bg:'#fdf3ef',grid:'#f5ddd5',ink:'#4A1B0C'},
  {head:'#5DCAA5',body:'#1D9E75',bg:'#1a1a1a',grid:'#242424',ink:'#9FE1CB'},
];
let ti=0,T=THEMES[0];

const FTYPES=[
  {type:'normal', pts:1, color:'#D85A30',r:4,  prob:0.65,ttl:null},
  {type:'silver', pts:3, color:'#888780',r:5,  prob:0.22,ttl:200},
  {type:'gold',   pts:5, color:'#BA7517',r:5.5,prob:0.10,ttl:140},
  {type:'rainbow',pts:10,color:'#7F77DD',r:6.5,prob:0.03,ttl:90},
];

let snake,dir,nextDir,foods=[],score,best=0,running=false,loopId,tick=0;
let blocked=false;

const LS_KEY='snakeGame_lb_v1';
function lbLoad(){try{return JSON.parse(localStorage.getItem(LS_KEY))||[];}catch(e){return[];}}
function lbSave(data){try{localStorage.setItem(LS_KEY,JSON.stringify(data));}catch(e){}}
let lb=lbLoad();

function speedMs(){
  const eased=Math.min(1,Math.max(0,(snake.length-3)/(COLS*ROWS*0.6)))**2;
  return Math.round(160-eased*105);
}
function speedInfo(){
  const ms=speedMs();
  if(ms>=145)return{t:'Lv.1 慢速',bg:'#E1F5EE',c:'#0F6E56'};
  if(ms>=120)return{t:'Lv.2 正常',bg:'#E6F1FB',c:'#185FA5'};
  if(ms>=95) return{t:'Lv.3 快速',bg:'#FAEEDA',c:'#854F0B'};
  if(ms>=70) return{t:'Lv.4 急速',bg:'#FAECE7',c:'#993C1D'};
  return          {t:'Lv.5 瘋狂',bg:'#FCEBEB',c:'#A32D2D'};
}

function buildThemes(){
  const row=document.getElementById('sg-theme-row');row.innerHTML='';
  THEMES.forEach((th,i)=>{
    const b=document.createElement('div');b.className='sg-tb'+(i===ti?' active':'');
    b.style.background=th.head;
    b.addEventListener('click',()=>{ti=i;T=THEMES[i];buildThemes();running?render():drawIdle();});
    row.appendChild(b);
  });
}

function drawGrid(){
  ctx.fillStyle=T.bg;ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle=T.grid;ctx.lineWidth=0.5;
  for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*CW,0);ctx.lineTo(c*CW,canvas.height);ctx.stroke();}
  for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*CH);ctx.lineTo(canvas.width,r*CH);ctx.stroke();}
}
function cell(x,y,col,rr){
  ctx.fillStyle=col;ctx.beginPath();
  ctx.roundRect(x*CW+1,y*CH+1,CW-2,CH-2,rr??3);ctx.fill();
}
function drawFood(f){
  const ft=FTYPES.find(t=>t.type===f.type);
  const cx=f.x*CW+CW/2,cy=f.y*CH+CH/2;
  const pulse=(ft.ttl&&f.life/f.maxLife<0.25)?(Math.sin(tick*0.5)*0.18+0.82):1;
  const r=ft.r*pulse*(CW/20);
  ctx.fillStyle=ft.color;ctx.beginPath();
  if(f.type==='rainbow'){
    ctx.save();ctx.translate(cx,cy);ctx.rotate(tick*0.04);
    for(let i=0;i<5;i++){const a=Math.PI*2/5*i-Math.PI/2,ai=a+Math.PI/5;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);ctx.lineTo(Math.cos(ai)*r*0.45,Math.sin(ai)*r*0.45);}
    ctx.closePath();ctx.restore();
  }else if(f.type==='gold'){
    ctx.save();ctx.translate(cx,cy);
    for(let i=0;i<4;i++){const a=Math.PI/2*i-Math.PI/4;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
    ctx.closePath();ctx.restore();
  }else{ctx.arc(cx,cy,r,0,Math.PI*2);}
  ctx.fill();
  if(ft.ttl){
    ctx.strokeStyle=ft.color;ctx.lineWidth=1.5;ctx.globalAlpha=0.3;
    ctx.beginPath();ctx.arc(cx,cy,r+2.5,0,Math.PI*2*(f.life/f.maxLife));ctx.stroke();
    ctx.globalAlpha=1;ctx.lineWidth=1;
  }
}
function render(){drawGrid();foods.forEach(drawFood);snake.forEach((s,i)=>cell(s.x,s.y,i===0?T.head:T.body,i===0?5:3));}
function drawIdle(){
  drawGrid();ctx.fillStyle=T.ink;ctx.globalAlpha=0.55;ctx.textAlign='center';
  ctx.font=`500 ${Math.round(CW*1.2)}px sans-serif`;
  ctx.fillText('貪食蛇',canvas.width/2,canvas.height/2-CW*0.6);
  ctx.font=`400 ${Math.round(CW*0.62)}px sans-serif`;
  ctx.fillText('按「開始」或方向鍵開始遊戲',canvas.width/2,canvas.height/2+CW*0.8);
  ctx.globalAlpha=1;
}

function pickFood(){let a=0,r=Math.random();for(const f of FTYPES){a+=f.prob;if(r<a)return f;}return FTYPES[0];}
function spawn(forceN){
  const occ=[...snake,...foods.map(f=>({x:f.x,y:f.y}))];
  let pos,t=0;
  do{pos={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};t++;}
  while(occ.some(s=>s.x===pos.x&&s.y===pos.y)&&t<300);
  const ft=forceN?FTYPES[0]:pickFood();
  foods.push({...pos,type:ft.type,life:ft.ttl||9999,maxLife:ft.ttl||9999});
}
function ensureNormal(){if(!foods.some(f=>f.type==='normal'))spawn(true);}

function updSpeed(){
  const s=speedInfo();const b=document.getElementById('sg-speed');
  b.textContent=s.t;b.style.background=s.bg;b.style.color=s.c;
}

function init(){
  const mx=Math.floor(COLS/2),my=Math.floor(ROWS/2);
  snake=[{x:mx,y:my},{x:mx-1,y:my},{x:mx-2,y:my}];
  dir={x:1,y:0};nextDir={x:1,y:0};score=0;foods=[];tick=0;
  document.getElementById('sg-score').textContent=0;
  spawn(true);
}

function doTick(){
  tick++;dir=nextDir;
  const h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(h.x<0||h.x>=COLS||h.y<0||h.y>=ROWS||snake.some(s=>s.x===h.x&&s.y===h.y)){
    clearInterval(loopId);running=false;showGameOver();return;
  }
  snake.unshift(h);
  const ei=foods.findIndex(f=>f.x===h.x&&f.y===h.y);
  if(ei>=0){
    const pts=FTYPES.find(t=>t.type===foods[ei].type).pts;
    score+=pts;
    if(score>best){best=score;document.getElementById('sg-best').textContent=best;}
    document.getElementById('sg-score').textContent=score;
    foods.splice(ei,1);updSpeed();clearInterval(loopId);loopId=setInterval(doTick,speedMs());spawn(false);ensureNormal();
  }else{snake.pop();}
  foods.forEach(f=>{if(f.maxLife<9999)f.life--;});
  foods=foods.filter(f=>f.life>0);ensureNormal();
  if(tick%30===0&&foods.length<3&&Math.random()<0.4)spawn(false);
  render();
}

function start(){
  if(blocked)return;
  clearInterval(loopId);
  document.getElementById('sg-ov').classList.remove('show');
  init();running=true;
  document.getElementById('btn-start').textContent='重新開始';
  updSpeed();render();loopId=setInterval(doTick,speedMs());
}

function showGameOver(){
  blocked=true;
  document.getElementById('sg-ov-msg').textContent=`本局得分：${score}　最高：${best}`;
  document.getElementById('sg-name').value='';
  document.getElementById('sg-ov').classList.add('show');
  setTimeout(()=>document.getElementById('sg-name').focus(),150);
}
function closeGameOver(){document.getElementById('sg-ov').classList.remove('show');blocked=false;}
function submitScore(skip){
  const raw=document.getElementById('sg-name').value.trim();
  if(!skip&&raw){
    lb.push({name:raw.slice(0,12),score});lb.sort((a,b)=>b.score-a.score);lb=lb.slice(0,10);
    lbSave(lb);renderLB();
  }
  closeGameOver();
}

const nameInput=document.getElementById('sg-name');
nameInput.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();submitScore(false);}e.stopPropagation();});
nameInput.addEventListener('keyup',e=>e.stopPropagation());
nameInput.addEventListener('keypress',e=>e.stopPropagation());

document.getElementById('btn-submit').addEventListener('click',()=>submitScore(false));
document.getElementById('btn-skip').addEventListener('click',()=>submitScore(true));
document.getElementById('btn-rules').addEventListener('click',()=>document.getElementById('sg-rules').classList.add('show'));
document.getElementById('btn-rules-close').addEventListener('click',()=>document.getElementById('sg-rules').classList.remove('show'));
document.getElementById('btn-start').addEventListener('click',start);
document.getElementById('btn-lb-clear').addEventListener('click',()=>{
  if(confirm('確定要清除所有排行紀錄嗎？')){lb=[];lbSave(lb);renderLB();}
});

document.addEventListener('keydown',e=>{
  if(blocked)return;
  if(!running){if('ArrowUp ArrowDown ArrowLeft ArrowRight w a s d'.includes(e.key)){start();return;}}
  const m={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0}};
  const nd=m[e.key];
  if(nd&&!(nd.x===-dir.x&&nd.y===-dir.y)){nextDir=nd;e.preventDefault();}
});

const DMAP={up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}};
['up','down','left','right'].forEach(k=>{
  document.getElementById('dp-'+k).addEventListener('pointerdown',e=>{
    e.preventDefault();if(blocked)return;if(!running){start();return;}
    const nd=DMAP[k];if(!(nd.x===-dir.x&&nd.y===-dir.y))nextDir=nd;
  },{passive:false});
});

let tx=0,ty=0;
canvas.addEventListener('touchstart',e=>{if(blocked)return;tx=e.touches[0].clientX;ty=e.touches[0].clientY;e.preventDefault();},{passive:false});
canvas.addEventListener('touchend',e=>{
  if(blocked)return;if(!running){start();return;}
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<10&&Math.abs(dy)<10)return;
  const nd=Math.abs(dx)>Math.abs(dy)?(dx>0?{x:1,y:0}:{x:-1,y:0}):(dy>0?{x:0,y:1}:{x:0,y:-1});
  if(!(nd.x===-dir.x&&nd.y===-dir.y))nextDir=nd;
  e.preventDefault();
},{passive:false});

function renderLB(){
  const ul=document.getElementById('sg-lb-ul');
  if(!lb.length){ul.innerHTML='<li style="padding:14px;text-align:center;color:#999;font-size:13px">尚無紀錄</li>';return;}
  const M=['🥇','🥈','🥉'];
  ul.innerHTML=lb.map((e,i)=>{
    const badge=e.score>=20?`<span class="lb-badge" style="background:#FAEEDA;color:#854F0B">高手</span>`:e.score>=10?`<span class="lb-badge" style="background:#E6F1FB;color:#185FA5">進階</span>`:'';
    return `<li><span class="lb-rank">${M[i]||i+1}</span><span class="lb-name">${e.name}</span>${badge}<span class="lb-score">${e.score}</span></li>`;
  }).join('');
}

buildThemes();updSpeed();drawIdle();renderLB();
</script>
</body>
</html>
